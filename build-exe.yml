name: Build Windows Executable

on:
  push:
    branches: [ "main" ]  # Triggers automatically whenever you update code
  workflow_dispatch:       # Allows you to trigger the build manually with a button

jobs:
  build:
    runs-on: windows-latest  # Spins up a clean, virtual Windows environment

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set Up Python Ecosystem
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.11'

    - name: Install Compiling Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter pyinstaller

    - name: Compile Script via PyInstaller
      run: |
        pyinstaller --noconsole --onefile app.py

    - name: Upload Finished App as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Cyber-Aggregator-Windows-App
        path: dist/app.exe
